<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather API App | Live Updates</title>
    <meta name="description" content="Get live weather updates for any city in India and across the globe with a clean, modern interface.">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="container">
        <h1>Weather Update</h1>
        
        <div class="search-box">
            <input type="text" id="cityInput" placeholder="Enter city name (e.g. Delhi)" aria-label="City Name">
            <button id="searchBtn">Search</button>
        </div>

        <div id="loader" class="loader"></div>
        <div id="errorMessage" class="error-message"></div>

        <section id="weatherInfo" class="weather-info">
            <div class="city-name" id="cityName">Delhi, IN</div>
            <div class="temp-display" id="temperature">--°C</div>
            <div class="condition" id="conditionText">Sunny</div>
            
            <p class="description-text" id="descriptionText">
                Today's Weather in Delhi is Sunny with 32°C.
            </p>

            <div class="details-grid">
                <div class="detail-item">
                    <div class="detail-label">Humidity</div>
                    <div class="detail-value" id="humidityValue">--%</div>
                </div>
                <div class="detail-item">
                    <div class="detail-label">Wind Speed</div>
                    <div class="detail-value" id="windValue">-- km/h</div>
                </div>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
